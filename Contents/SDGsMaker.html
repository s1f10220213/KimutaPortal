<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDGs風アイコンメーカー（シルエット・白塗り版）</title>
    <style>
        /* ベースのフォントも合わせる */
        body { font-family: 'Noto Sans JP', sans-serif; font-weight: 700; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); display: flex; gap: 30px; max-width: 900px; }
        .controls { width: 300px; display: flex; flex-direction: column; gap: 15px; }
        .preview-area { display: flex; flex-direction: column; align-items: center; }
        canvas { border: 1px solid #ddd; background-color: #eee; max-width: 100%; height: auto; }
        
        label { font-size: 0.9rem; font-weight: bold; margin-bottom: 5px; display: block; }
        input[type="text"], textarea, select { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-family: 'Noto Sans JP', sans-serif;}
        input[type="range"] { width: 100%; }
        .btn { background: #007bff; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; font-family: 'Noto Sans JP', sans-serif;}
        .btn:hover { background: #0056b3; }
        .color-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 5px; margin-top: 5px; }
        .color-dot { width: 100%; padding-top: 100%; height: 0; cursor: pointer; border-radius: 3px; border: 1px solid rgba(0,0,0,0.1); }
        
        .separator { border-top: 1px solid #eee; margin: 10px 0; }
        .sub-label { font-size: 0.8rem; color: #555; font-weight: normal; margin-bottom: 2px;}
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700&family=Oswald:wght@700&display=swap" rel="stylesheet">

</head>
<body>

<div class="container">
    <div class="controls">
        <h2>設定</h2>
        
        <div>
            <label>背景色</label>
            <input type="color" id="bgColor" value="#e5243b">
            <div class="color-grid" id="presetColors"></div>
        </div>

        <div>
            <label>数字 (例: 1, 14, ...)</label>
            <input type="text" id="goalNum" placeholder="1" value="1" style="font-family: 'Oswald', sans-serif;">
        </div>

        <div>
            <label>目標テキスト</label>
            <textarea id="goalText" rows="2">貧困を&#13;なくそう</textarea>
        </div>

        <div class="separator"></div>

        <div>
            <label>アイコン画像 (シルエット化)</label>
            <input type="file" id="imageInput" accept="image/*">
            
            <div style="margin-top:10px;">
                <label class="sub-label">1. 透過する色 (背景色)</label>
                <input type="color" id="chromaKeyColor" value="#ffffff">
                
                <label class="sub-label">色の許容範囲: <span id="toleranceVal">50</span></label>
                <input type="range" id="colorTolerance" min="0" max="200" value="50">
            </div>

            <div style="margin-top:10px;">
                <label class="sub-label">2. シルエットの不透明度</label>
                <input type="range" id="fillOpacity" min="0" max="100" value="100">
            </div>
        </div>

        <button class="btn" id="downloadBtn">画像を保存する</button>
    </div>

    <div class="preview-area">
        <canvas id="mainCanvas" width="512" height="512"></canvas>
        <p style="color: #888;">512 x 512 px</p>
    </div>
</div>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const inputs = ['bgColor', 'goalNum', 'goalText', 'chromaKeyColor', 'colorTolerance', 'fillOpacity'];
    let uploadedImage = null;

    const sdgsColors = ['#e5243b', '#dda63a', '#4c9f38', '#c5192d', '#ff3a21', '#26bde2', '#fcc30b', '#a21942', '#fd6925', '#dd1367', '#fd9d24', '#bf8b2e', '#3f7e44', '#0a97d9', '#56bc27', '#00689d', '#19486a'];

    window.onload = () => {
        const colorGrid = document.getElementById('presetColors');
        sdgsColors.forEach(color => {
            const dot = document.createElement('div');
            dot.className = 'color-dot';
            dot.style.backgroundColor = color;
            dot.onclick = () => { document.getElementById('bgColor').value = color; draw(); };
            colorGrid.appendChild(dot);
        });

        // フォントの読み込み完了を待ってから初回描画
        document.fonts.ready.then(() => {
            draw();
        });
    };

    inputs.forEach(id => {
        document.getElementById(id).addEventListener('input', (e) => {
            if(id === 'colorTolerance') document.getElementById('toleranceVal').innerText = e.target.value;
            draw();
        });
    });

    document.getElementById('imageInput').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                uploadedImage = img;
                draw();
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    function draw() {
        const bgColor = document.getElementById('bgColor').value;
        const goalNum = document.getElementById('goalNum').value;
        const goalText = document.getElementById('goalText').value;
        
        const chromaKeyHex = document.getElementById('chromaKeyColor').value;
        const tolerance = parseInt(document.getElementById('colorTolerance').value);
        const fillOpacity = parseInt(document.getElementById('fillOpacity').value);

        // 1. 背景描画
        ctx.fillStyle = bgColor;
        ctx.fillRect(0, 0, 512, 512);

        // 2. 数字の描画 (SDGs公式風: Oswald Bold)
        ctx.fillStyle = 'white';
        ctx.font = '700 120px "Oswald", sans-serif';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'top';
        ctx.fillText(goalNum, 20, 20);

        // 3. テキストの描画 (SDGs公式風: Noto Sans JP Bold)
        ctx.font = '700 36px "Noto Sans JP", sans-serif';
        const lines = goalText.split('\n');
        lines.forEach((line, i) => {
            ctx.fillText(line, 140, 30 + (i * 45));
        });

        // 4. 画像処理 (白塗りシルエット化)
        if (uploadedImage) {
            const workSize = 350;
            const tempCanvas = document.createElement('canvas');
            const tCtx = tempCanvas.getContext('2d');
            tempCanvas.width = workSize;
            tempCanvas.height = workSize;
            
            // 画像を中心に配置（アスペクト比維持）
            const scale = Math.min(workSize / uploadedImage.width, workSize / uploadedImage.height);
            const w = uploadedImage.width * scale;
            const h = uploadedImage.height * scale;
            tCtx.drawImage(uploadedImage, (workSize-w)/2, (workSize-h)/2, w, h);

            let imageData = tCtx.getImageData(0, 0, workSize, workSize);
            let data = imageData.data;

            const keyR = parseInt(chromaKeyHex.slice(1, 3), 16);
            const keyG = parseInt(chromaKeyHex.slice(3, 5), 16);
            const keyB = parseInt(chromaKeyHex.slice(5, 7), 16);

            const opacityMultiplier = fillOpacity / 100;
            const softness = 25; // 境界を滑らかにするためのソフトネス領域

            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i+1];
                const b = data[i+2];
                const a = data[i+3];
                
                if (a === 0) continue; // 既に透明な場合はスキップ

                const dist = Math.sqrt(Math.pow(r - keyR, 2) + Math.pow(g - keyG, 2) + Math.pow(b - keyB, 2));

                if (dist <= tolerance) {
                    // 許容範囲内は完全に透過
                    data[i+3] = 0;
                } else if (dist < tolerance + softness) {
                    // 境界部分は滑らかに半透明にして馴染ませる
                    const alphaRatio = (dist - tolerance) / softness;
                    data[i] = 255;
                    data[i+1] = 255;
                    data[i+2] = 255;
                    data[i+3] = a * alphaRatio * opacityMultiplier;
                } else {
                    // それ以外の部分は白で塗りつぶす
                    data[i] = 255;
                    data[i+1] = 255;
                    data[i+2] = 255;
                    data[i+3] = a * opacityMultiplier;
                }
            }

            tCtx.putImageData(imageData, 0, 0);

            // メインキャンバスに描画位置調整
            ctx.drawImage(tempCanvas, (512-workSize)/2, 160);
        }
    }

    document.getElementById('downloadBtn').onclick = () => {
        const link = document.createElement('a');
        link.download = `sdgs-icon-${document.getElementById('goalNum').value}.png`;
        link.href = canvas.toDataURL();
        link.click();
    };
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>背景色を透過するツール</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 0 20px; line-height: 1.6; }
        .controls { background: #f4f4f4; padding: 20px; border-radius: 8px; display: grid; gap: 15px; }
        .control-group { display: flex; align-items: center; gap: 10px; }
        canvas { max-width: 100%; height: auto; border: 1px solid #ccc; margin-top: 20px; background-image: 
            linear-gradient(45deg, #eee 25%, transparent 25%, transparent 75%, #eee 75%), 
            linear-gradient(45deg, #eee 25%, transparent 25%, transparent 75%, #eee 75%);
            background-size: 20px 20px; background-position: 0 0, 10px 10px; }
        .download-btn { display: inline-block; margin-top: 10px; padding: 10px 20px; background: #007bff; color: white; text-decoration: none; border-radius: 5px; }
        .download-btn:hover { background: #0056b3; }
        input[type="range"] { flex-grow: 1; }
    </style>
</head>
<body>

    <h2>画像特定色透過ツール</h2>
    
    <div class="controls">
        <div class="control-group">
            <label>1. 画像を選択:</label>
            <input type="file" id="upload" accept="image/*">
        </div>
        
        <div class="control-group">
            <label>2. 透過する色:</label>
            <input type="color" id="targetColor" value="#ffffff">
        </div>

        <div class="control-group">
            <label>3. 閾値 (範囲):</label>
            <input type="range" id="threshold" min="0" max="255" value="30">
            <span id="thresholdVal">30</span>
        </div>
    </div>

    <div>
        <h3>プレビュー</h3>
        <canvas id="canvas"></canvas>
        <br>
        <a id="download" class="download-btn" style="display:none;">加工後の画像を保存 (.png)</a>
    </div>

    <script>
        const upload = document.getElementById('upload');
        const targetColorInput = document.getElementById('targetColor');
        const thresholdInput = document.getElementById('threshold');
        const thresholdVal = document.getElementById('thresholdVal');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const downloadBtn = document.getElementById('download');

        let originalImage = null;

        // 画像読み込み
        upload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                originalImage = new Image();
                originalImage.onload = () => {
                    canvas.width = originalImage.width;
                    canvas.height = originalImage.height;
                    processImage();
                    downloadBtn.style.display = 'inline-block';
                };
                originalImage.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });

        // パラメータ変更時に再描画
        [targetColorInput, thresholdInput].forEach(el => {
            el.addEventListener('input', () => {
                thresholdVal.textContent = thresholdInput.value;
                if (originalImage) processImage();
            });
        });

        // 透過メイン処理
        function processImage() {
            // キャンバスに一度画像を描画
            ctx.drawImage(originalImage, 0, 0);
            
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            
            // ターゲット色のRGB取得
            const targetHex = targetColorInput.value;
            const targetR = parseInt(targetHex.slice(1, 3), 16);
            const targetG = parseInt(targetHex.slice(3, 5), 16);
            const targetB = parseInt(targetHex.slice(5, 7), 16);
            const threshold = parseInt(thresholdInput.value);

            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i + 1];
                const b = data[i + 2];

                // ユークリッド距離で色の近さを判定
                // 距離 d = sqrt((r1-r2)^2 + (g1-g2)^2 + (b1-b2)^2)
                const distance = Math.sqrt(
                    Math.pow(r - targetR, 2) +
                    Math.pow(g - targetG, 2) +
                    Math.pow(b - targetB, 2)
                );

                if (distance <= threshold) {
                    data[i + 3] = 0; // Alpha値を0(透明)にする
                }
            }

            ctx.putImageData(imageData, 0, 0);
            
            // ダウンロードリンクの更新
            downloadBtn.href = canvas.toDataURL('image/png');
            downloadBtn.download = 'transparent_image.png';
        }
    </script>
</body>
</html>
